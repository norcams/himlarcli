---
# https://iaas.readthedocs.io/team/tips_and_tricks/dedicated-flavors.html
public: false
properties:
  hw_rng:allowed: 'True'
  hw_rng:rate_bytes: 2048
  hw_rng:rate_period: 1
  hw:mem_page_size: 2048
  hw:cpu_policy: 'dedicated'
  hw:cpu_thread_policy: 'require'
  trait:CUSTOM_NREC_ATLAS2: 'required'
atlas.c1a:
  'atlas.c1a.8xlarge':
    vcpus: 32
    ram:   81920
    disk:  20
  'atlas.c1a.12xlarge':
    vcpus: 48
    ram:   122880
    disk:  30
  'atlas.c1a.24xlarge':
    vcpus: 96
    ram:   245760
    disk:  80
