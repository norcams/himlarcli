---
# DEDICATED m1a flavor (OSL)
#
# RAM per core: 3840
# RAM per instance: vcpus * ram_per_core - 2
#
public: false
properties:
  hw_rng:allowed: 'True'
  hw_rng:rate_bytes: 2048
  hw_rng:rate_period: 1
  hw:numa_nodes: 1
  hw:cpu_sockets: 1
  hw:cpu_policy: 'dedicated'
  hw:cpu_thread_policy: 'require'
  hw:mem_page_size: 2048
  trait:CUSTOM_NREC_DEDICATED1: 'required'
dedicated.m1a:
  'dedicated.m1a.large':
    vcpus: 2
    ram: 7678
    disk: 20
  'dedicated.m1a.xlarge':
    vcpus: 4
    ram: 15358
    disk: 20
  'dedicated.m1a.2xlarge':
    vcpus: 8
    ram: 30718
    disk: 20
  'dedicated.m1a.4xlarge':
    vcpus: 16
    ram: 61438
    disk: 20
  'dedicated.m1a.8xlarge':
    vcpus: 32
    ram: 122878
    disk: 20
  'dedicated.m1a.16xlarge':
    vcpus: 64
    ram: 245758
    disk: 20
