---
# r1 flavor used for Elixir (intel)
# used for elixir standard compute hosts
public: false
properties:
  hw_rng:allowed: "True"
  hw_rng:rate_bytes: 2048
  hw_rng:rate_period: 1
  aggregate_instance_extra_specs:type: "s== elixir2"

elixir.r1a:
  "elixir.r1a.large":
    vcpus: 2
    ram: 16384
    disk: 50
  "elixir.r1a.xlarge":
    vcpus: 4
    ram: 32768
    disk: 80
  "elixir.r1a.2xlarge":
    vcpus: 8
    ram: 65536
    disk: 80
  "elixir.r1a.4xlarge":
    vcpus: 16
    ram: 131072
    disk: 80
